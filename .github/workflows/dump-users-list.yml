name: dump-users-list

# 전 유저 목록(users-list.json) 주기 재생성 — 웹 fetchAllUsers 의 jsdelivr 소스.
# 유저별 카드(user/{id}.json)는 webhook 실시간, 목록도 webhook 시 해당 유저만 즉시 병합
# (merge-user-into-list.mjs). 이 cron 은 **전체 정합성 보정용**이라 15분 간격(변경 시에만 commit).
#   ⚠️ '*/5' 였을 때 GitHub Actions 스로틀로 실제 1~5시간 간격 실행됨(실측: 04:21→09:10 = 4h49m).
#      고빈도 schedule 일수록 드롭 비율이 높아 오히려 간격이 벌어진다 → 15분으로 낮춰 실행률을 높인다.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}   # 수동 실행도 가능

concurrency:
  group: dump-users-list
  cancel-in-progress: true

jobs:
  dump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build users-list.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node .github/scripts/dump-users-list.mjs

      - name: Commit & push (변경 시만)
        run: |
          if [ -z "$(git status --porcelain users-list.json songs.json)" ]; then echo "변경 없음 — skip"; exit 0; fi
          git config user.name "ohsorry-bot"
          git config user.email "hanekawa4365@gmail.com"
          git add users-list.json songs.json
          git commit -m "auto: users-list/songs 갱신"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && break
            echo "push 재시도 $i"; sleep 3
          done
          # purge 검증-재시도 — push 직후 즉시 purge 가 구본을 재캐시하는 레이스 방지(dump-user.yml 과 동일).
          purge_verify() {
            local f="$1"
            local want; want=$(sha1sum "$f" | cut -d' ' -f1)
            for i in 1 2 3 4 5; do
              curl -sS "https://purge.jsdelivr.net/gh/OhSorry-DP/ohsorry-data@main/$f" > /dev/null || true
              sleep 5
              local got; got=$(curl -s "https://cdn.jsdelivr.net/gh/OhSorry-DP/ohsorry-data@main/$f" | sha1sum | cut -d' ' -f1)
              if [ "$got" = "$want" ]; then echo "purge OK(시도 $i): $f"; return 0; fi
              echo "purge 불일치 — 재시도 $i: $f"
            done
            echo "::warning::purge 검증 실패(최대 12h stale 가능): $f"
          }
          purge_verify "users-list.json"
          purge_verify "songs.json"
