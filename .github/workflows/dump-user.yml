name: dump-user

# vercel 함수(api/dump-trigger)가 보내는 repository_dispatch(dump-user) 로 기동.
# client_payload.iidx_id 유저를 supabase 에서 재덤프 → user/{id}.json commit/push → jsdelivr purge.
on:
  repository_dispatch:
    types: [dump-user]

# 같은 유저 연속 업로드는 마지막 것만(이전 실행 취소). 다른 유저는 병렬.
concurrency:
  group: dump-${{ github.event.client_payload.iidx_id }}
  cancel-in-progress: true

jobs:
  dump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # iidx_id 는 외부(supabase record) 유래 → 쉘에 직접 보간하지 말고 env 경유(인젝션 방지).
    env:
      IIDX_ID: ${{ github.event.client_payload.iidx_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Dump user from supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node .github/scripts/dump-user.mjs "$IIDX_ID"

      - name: Commit & push
        run: |
          if [ -z "$(git status --porcelain user/)" ]; then echo "변경 없음 — skip"; exit 0; fi
          git config user.name "ohsorry-bot"
          git config user.email "hanekawa4365@gmail.com"
          # 산출물을 임시 보관 — push 충돌 시 origin 최신 위에 재적용.
          #   users-list.json 은 단일 라인 JSON 이라 rebase 로는 병합 불가 → 매 시도마다
          #   origin/main 으로 reset 후 유저 파일 복원 + 목록 재병합으로 충돌 자체를 회피.
          cp "user/$IIDX_ID.json" /tmp/dump-user-artifact.json
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/dump-user-artifact.json "user/$IIDX_ID.json"
            # 유저 목록에도 즉시 병합 — dump-users-list cron 이 GitHub 스로틀로 1~3시간
            # 밀려 신규 유저가 목록에 안 보이던 문제 해소(cron 은 전체 정합성 보정용 유지).
            node .github/scripts/merge-user-into-list.mjs "user/$IIDX_ID.json"
            if [ -z "$(git status --porcelain)" ]; then echo "변경 없음 — skip"; exit 0; fi
            git add user/ users-list.json
            git commit -m "auto dump: $IIDX_ID"
            git push && exit 0
            echo "push 재시도 $i"; sleep 3
          done
          echo "push 실패"; exit 1

      - name: Purge jsdelivr
        run: |
          curl -sS "https://purge.jsdelivr.net/gh/OhSorry-DP/ohsorry-data@main/user/$IIDX_ID.json" || true
          curl -sS "https://purge.jsdelivr.net/gh/OhSorry-DP/ohsorry-data@main/users-list.json" || true
